version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sacmes-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    command: >
      sh -c "
      if [ -f /run/secrets/redis_password ]; then
        REDIS_PASSWORD=$$(cat /run/secrets/redis_password)
      else
        REDIS_PASSWORD=$${REDIS_PASSWORD:-}
      fi
      if [ -z \"$$REDIS_PASSWORD\" ]; then
        echo 'ERROR: Redis password not provided via secret or environment variable'
        exit 1
      fi
      redis-server --requirepass \"$$REDIS_PASSWORD\" --maxmemory 256mb --maxmemory-policy allkeys-lru
      "
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - sacmes_network
    restart: unless-stopped
    healthcheck:
      test: >
        sh -c "
        if [ -f /run/secrets/redis_password ]; then
          REDIS_PASSWORD=$$(cat /run/secrets/redis_password)
        else
          REDIS_PASSWORD=$${REDIS_PASSWORD:-}
        fi
        redis-cli -a \"$$REDIS_PASSWORD\" ping
        "
      interval: 30s
      timeout: 10s
      retries: 3

  sacmes-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sacmes-web
    ports:
      - "5000:5000"
    environment:
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - AGENT_AUTH_TOKEN_FILE=/run/secrets/agent_auth_token
      - FLASK_ENV=production
    secrets:
      - redis_password
      - secret_key
      - agent_auth_token
    volumes:
      - ../temp_uploads:/app/temp_uploads
    networks:
      - sacmes_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/', timeout=10)"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s

  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: sacmes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - sacmes_network
    depends_on:
      - sacmes-web
    restart: unless-stopped
    profiles:
      - production

volumes:
  redis_data:
    driver: local

networks:
  sacmes_network:
    driver: bridge

secrets:
  redis_password:
    file: ./secrets/redis_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
  agent_auth_token:
    file: ./secrets/agent_auth_token.txt