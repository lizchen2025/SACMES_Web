version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sacmes-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sacmes_redis_pass}
    command: redis-server --requirepass ${REDIS_PASSWORD:-sacmes_redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sacmes_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sacmes_redis_pass}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  sacmes-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sacmes-web
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sacmes_redis_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_in_production}
      - AGENT_AUTH_TOKEN=${AGENT_AUTH_TOKEN:-your_super_secret_token_here}
      - FLASK_ENV=production
    volumes:
      - ../temp_uploads:/app/temp_uploads
    networks:
      - sacmes_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/', timeout=10)"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s

  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: sacmes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - sacmes_network
    depends_on:
      - sacmes-web
    restart: unless-stopped
    profiles:
      - production

volumes:
  redis_data:
    driver: local

networks:
  sacmes_network:
    driver: bridge