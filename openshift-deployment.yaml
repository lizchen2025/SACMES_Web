apiVersion: v1
kind: Template
metadata:
  name: sacmes-web-template
  annotations:
    description: "SACMES Web Application for Multi-User Electrochemical Analysis"
    tags: "python,flask,redis,analytics"
parameters:
- name: APP_NAME
  displayName: Application Name
  description: The name assigned to all of the application components defined in this template
  value: sacmes-web
  required: true
- name: GIT_SOURCE_URL
  displayName: Git Repository URL
  description: The URL of the repository with your application source code
  required: true
- name: GIT_SOURCE_REF
  displayName: Git Reference
  description: Set this to a branch name, tag or other ref of your repository if you are not using the default branch
  value: main
- name: REDIS_PASSWORD
  displayName: Redis Password
  description: Password for the Redis database
  generate: expression
  from: "[a-zA-Z0-9]{12}"
  required: true
- name: SECRET_KEY
  displayName: Flask Secret Key
  description: Secret key for Flask session management
  generate: expression
  from: "[a-zA-Z0-9]{32}"
  required: true
- name: AGENT_AUTH_TOKEN
  displayName: Agent Authentication Token
  description: Token for authenticating local agents
  generate: expression
  from: "[a-zA-Z0-9]{24}"
  required: true

objects:
# Redis Deployment
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: ${APP_NAME}-redis
    labels:
      app: ${APP_NAME}
      component: redis
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: ${APP_NAME}
        component: redis
    template:
      metadata:
        labels:
          app: ${APP_NAME}
          component: redis
      spec:
        containers:
        - name: redis
          image: redis:7-alpine
          ports:
          - containerPort: 6379
            protocol: TCP
          env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-secrets
                key: redis-password
          command:
          - redis-server
          - --requirepass
          - $(REDIS_PASSWORD)
          - --maxmemory
          - 256mb
          - --maxmemory-policy
          - allkeys-lru
          volumeMounts:
          - name: redis-data
            mountPath: /data
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
        volumes:
        - name: redis-data
          emptyDir: {}

# Redis Service
- apiVersion: v1
  kind: Service
  metadata:
    name: ${APP_NAME}-redis
    labels:
      app: ${APP_NAME}
      component: redis
  spec:
    ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
    selector:
      app: ${APP_NAME}
      component: redis

# Application Deployment
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: ${APP_NAME}
    labels:
      app: ${APP_NAME}
      component: web
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: ${APP_NAME}
        component: web
    template:
      metadata:
        labels:
          app: ${APP_NAME}
          component: web
      spec:
        containers:
        - name: sacmes-web
          image: python:3.9-slim
          ports:
          - containerPort: 5000
            protocol: TCP
          env:
          - name: REDIS_URL
            value: redis://:$(REDIS_PASSWORD)@${APP_NAME}-redis:6379/0
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-secrets
                key: redis-password
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-secrets
                key: secret-key
          - name: AGENT_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: ${APP_NAME}-secrets
                key: agent-auth-token
          - name: FLASK_ENV
            value: production
          - name: PYTHONUNBUFFERED
            value: "1"
          command:
          - /bin/bash
          - -c
          - |
            cd /app
            pip install --no-cache-dir -r requirements.txt
            python app.py
          volumeMounts:
          - name: app-source
            mountPath: /app
          - name: temp-uploads
            mountPath: /app/temp_uploads
          resources:
            limits:
              memory: 1Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
        volumes:
        - name: app-source
          configMap:
            name: ${APP_NAME}-source
        - name: temp-uploads
          emptyDir: {}
        initContainers:
        - name: git-clone
          image: alpine/git
          command:
          - /bin/sh
          - -c
          - |
            git clone ${GIT_SOURCE_URL} /tmp/source
            cd /tmp/source
            git checkout ${GIT_SOURCE_REF}
            cp -r * /app/
          volumeMounts:
          - name: app-source
            mountPath: /app

# Application Service
- apiVersion: v1
  kind: Service
  metadata:
    name: ${APP_NAME}
    labels:
      app: ${APP_NAME}
      component: web
  spec:
    ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
    selector:
      app: ${APP_NAME}
      component: web

# Route for external access
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: ${APP_NAME}
    labels:
      app: ${APP_NAME}
  spec:
    to:
      kind: Service
      name: ${APP_NAME}
    port:
      targetPort: 5000
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# Secrets
- apiVersion: v1
  kind: Secret
  metadata:
    name: ${APP_NAME}-secrets
    labels:
      app: ${APP_NAME}
  type: Opaque
  stringData:
    redis-password: ${REDIS_PASSWORD}
    secret-key: ${SECRET_KEY}
    agent-auth-token: ${AGENT_AUTH_TOKEN}

# ConfigMap for application source (alternative to git clone)
- apiVersion: v1
  kind: ConfigMap
  metadata:
    name: ${APP_NAME}-source
    labels:
      app: ${APP_NAME}
  data:
    # This would contain the application files
    # In practice, you'd use a BuildConfig instead
    placeholder: "Use BuildConfig for production deployments"

# HorizontalPodAutoscaler
- apiVersion: autoscaling/v2
  kind: HorizontalPodAutoscaler
  metadata:
    name: ${APP_NAME}-hpa
    labels:
      app: ${APP_NAME}
  spec:
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: ${APP_NAME}
    minReplicas: 2
    maxReplicas: 10
    metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80